; Waveshare ESP32-S3-Touch-LCD-2.1 + 2.1" round ST7701 RGB LCD (480×480)
; Board in Arduino IDE: "ESP32S3 Dev Module"

[env:waveshare-esp32-s3-touch-lcd-2-1]
platform = espressif32@6.5.0
board = waveshare_esp32_s3_touch_lcd_2_1
framework = arduino
monitor_speed = 115200
; The local board definition below describes the actual N16R8 module.
board_build.partitions = partitions/plane_radar.csv
extra_scripts = post:scripts/merge_firmware.py

; Anti-aliased VLW font (Noto Sans Bold 15, from TFT_eSPI smooth-font examples)
board_build.embed_files = data/ui_font.vlw

; USB serial over USB-C
build_flags =
  -std=gnu++17
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -DWM_NODEBUG
  -DWM_MDNS

lib_deps =
  lovyan03/LovyanGFX@^1.2.7
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.4.2
